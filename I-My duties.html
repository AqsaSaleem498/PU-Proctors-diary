                    <td colspan="5" style="text-align:center;">
                        No duties assigned yet.
                    </td>
                </tr>
            </table>
        </div>

    </div>

    <script>
        // ===== Dummy backend simulation =====
        let dutyAssigned = false; // jab backend se duty milegi yeh true hoga

        if (dutyAssigned) {
            document.getElementById("noData").style.display = "none";

            let table = document.getElementById("dutyTable");

            table.innerHTML += `
    <tr>
        <td>1</td>
        <td>2025-08-27</td>
        <td>Morning</td>
        <td>Ravi Road – ravi road lahore</td>
