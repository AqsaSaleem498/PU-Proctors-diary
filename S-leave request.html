        <h2>Leave Request</h2>

        <div class="card">
            <h3>Submit New Request</h3>

            <div class="form-row">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date">
                </div>

                <div class="form-group">
                    <label>End Date</label>
                    <input type="date">
                </div>
            </div>

            <div class="form-group">
                <label>Reason</label>
                <textarea></textarea>
            </div>

            <button class="btn" onclick="submitRequest()">Submit Request</button>
            <div style="clear: both;"></div>
        </div>

        <div class="card">
            <h3>Your Leave History</h3>

            <table>
                <tr>
                    <th>#</th>
                    <th>Reason</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td colspan="5">No leave requests found.</td>
                </tr>
            </table>
        </div>

    </div>
